name: Test Backend

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main, "feature/*"]

jobs:
  test:
    name: pytest + coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aihm
          POSTGRES_PASSWORD: aihm
          POSTGRES_DB: aihm_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://aihm:aihm@localhost:5432/aihm_test
      DATABASE_URL: postgresql+asyncpg://aihm:aihm@localhost:5432/aihm_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      ANTHROPIC_API_KEY: sk-ant-fake-key-for-ci
      TWILIO_ACCOUNT_SID: ACfake000000000000000000000000000
      TWILIO_AUTH_TOKEN: fake_auth_token
      TWILIO_PHONE_NUMBER: "+15555550000"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Smoke tests
        run: pytest tests/test_smoke.py -v --tb=short
      - name: Full test suite
        run: pytest tests/ -v --tb=short -x --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=60
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
